name: Payment System CI Pipeline

# Trigger when code is pushed to main branch
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:

      # Step 1: Get the code from GitHub
      - name: Checkout Code
        uses: actions/checkout@v3

      # Step 2: Set up Java 17
      - name: Set Up Java 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      # Step 3: Build using Maven
      - name: Build with Maven
        run: mvn clean compile

      # Step 4: Run JUnit Tests automatically
      - name: Run Tests
        run: mvn test

      # Step 5: Package the app as JAR
      - name: Package App
        run: mvn package -DskipTests